<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code IA — Futuristic Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- FONDO ANIMADO -->
    <div class="background"></div>

    <header class="header">
        <h1 class="title">⚡ Code IA</h1>
        <p class="subtitle">Asistente de programación avanzado</p>
    </header>

    <main class="main">

        <!-- CONTENEDOR DEL CHAT -->
        <div id="chat-container" class="chat-container">
            <div id="chat" class="chat"></div>
            <div id="typing" class="typing hidden">Code IA está escribiendo...</div>
        </div>

        <!-- ÁREA DE INPUT -->
        <div id="input-area" class="input-area">

            <!-- BOTÓN DE ARCHIVOS -->
            <button id="btn-file" class="file-btn">📎</button>

            <!-- INPUT DE ARCHIVOS (OCULTO) -->
            <input type="file" id="file-input" class="hidden" multiple accept="image/*">

            <!-- TEXTAREA PROFESIONAL -->
            <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>

            <!-- BOTÓN ENVIAR -->
            <button id="btn-enviar" class="send-btn">Enviar</button>

            <!-- BOTÓN DETENER STREAMING -->
            <button id="btn-stop" class="stop-btn hidden">Detener</button>
        </div>

        <!-- ARCHIVOS ADJUNTADOS (MINIATURAS) -->
        <div id="attached-files" class="attached-files"></div>

    </main>

    <footer class="footer">
        <p>Creado por lil_drakko — Proyecto Code IA</p>
    </footer>

    <!-- PANEL DE PREVIEW -->
    <div id="preview-panel" class="preview hidden">
        <div id="preview-header" class="preview-header">
            <span>🔍 Vista previa generada</span>

            <div id="preview-buttons" class="preview-buttons">
                <button id="preview-pc">PC</button>
                <button id="preview-mobile">Móvil</button>
                <button id="preview-refresh">Actualizar</button>
                <button id="preview-fullscreen">Pantalla completa</button>
                <button id="preview-close">Cerrar</button>
            </div>
        </div>

        <iframe id="preview-frame" class="preview-frame"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
