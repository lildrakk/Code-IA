<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code IA - Asistente de Programación</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>⚡ Code IA</h1>
        <p class="subtitulo">Tu asistente experto en programación</p>
    </header>

    <main>
        <div id="chat-container">
            <div id="chat"></div>
            <div id="typing" class="typing hidden">Code IA está escribiendo...</div>
        </div>

        <div id="input-area">
            <input id="mensaje" type="text" placeholder="Escribe tu mensaje aquí...">
            <button id="btn-enviar">Enviar</button>
            <button id="btn-stop" class="hidden stop">Detener</button>
        </div>
    </main>

    <footer>
        <p>Creado por lil_drakko — Proyecto Code IA</p>
    </footer>

    <!-- PANEL DE PREVIEW PROFESIONAL -->
    <div id="preview-panel" class="hidden">
        <div id="preview-header">
            <span>🔍 Vista previa de la página generada</span>

            <div id="preview-buttons">
                <button id="preview-pc">PC</button>
                <button id="preview-mobile">Móvil</button>
                <button id="preview-refresh">Actualizar</button>
                <button id="preview-fullscreen">Pantalla completa</button>
                <button id="preview-close">Cerrar</button>
            </div>
        </div>

        <iframe id="preview-frame"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
