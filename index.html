<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Xtreme AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <h2>Xtreme AI</h2>
    <button onclick="nuevoChat()">Nuevo chat</button>
    <div id="lista-chats"></div>
  </div>

  <div id="chat">
    <div id="mensajes"></div>

    <div id="input-area">
      <textarea id="prompt" placeholder="Escribe tu mensaje..."></textarea>
      <select id="mode">
        <option value="chat">Chat</option>
        <option value="file">Archivo</option>
      </select>
      <input id="language" placeholder="python, js, etc.">
      <button onclick="enviar()">Enviar</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
